name: OSV Scanner

on:
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "30 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: osv-scanner-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-scheduled:
    name: OSV scheduled/main scan
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@1f1242919d8a60496dd1874b24b62b2370ed4c78
    with:
      scan-args: |-
        -r
        --skip-git
        ./

  scan-pr:
    name: OSV PR scan
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@1f1242919d8a60496dd1874b24b62b2370ed4c78
    with:
      scan-args: |-
        -r
        --skip-git
        ./
